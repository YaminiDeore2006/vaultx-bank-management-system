<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>VaultX Bank | Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="login-page">

    <!-- LEFT -->

    <div class="login-left">

        <div class="brand">

            <div class="bank-logo">

                <i class="fa-solid fa-building-columns"></i>

            </div>

            <h1>VaultX Bank</h1>

            <h3>Bank Management System</h3>

            <p>

                Secure Banking Platform for managing
                customers, accounts and transactions.

            </p>

        </div>

        <div class="illustration">

            <img th:src="@{/images/banking-login.svg}" alt="Bank">

        </div>

    </div>

    <!-- RIGHT -->

    <div class="login-right">

        <div class="login-card">

            <div class="card-header">

                <h2>Welcome Back 👋</h2>

                <p>Please login to your account</p>

            </div>

            <form th:action="@{/login}" method="post">

                <div class="input-group">
                    <label>Email Address</label>
                    <div class="input-field">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" placeholder="Enter Email">
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-field">
                        <i class="fa-solid fa-lock"></i>
                        <input id="password" type="password" placeholder="Enter Password">
                        <i id="togglePassword" class="fa-solid fa-eye toggle-password"></i>
                    </div>
                </div>

                <div class="login-options">
                    <label class="remember">
                        <input type="checkbox">
                        <span>Remember Me</span>
                    </label>

                    <a th:href="@{/forgot-password}">
                        Forgot Password?
                    </a>
                </div>

                <button type="submit" class="login-btn">
                    Login
                </button>

                <!-- 🔥 REGISTER LINK (MOVE HERE) -->
                <div class="register-link">
                    Don't have an account?
                    <a th:href="@{/register}">
                        Register Now
                    </a>
                </div>

            </form>

            <div class="footer-text">

                Secure • Reliable • Fast

            </div>

        </div>

    </div>

</div>

<script th:src="@{/js/login.js}"></script>

</body>
</html>
